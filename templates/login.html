{% extends "base.html" %}
{% block title %}登录 - 合同管理系统{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <h1>📋 合同管理系统</h1>
    <p class="subtitle">请使用演示账号登录</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ base_path }}/login" data-validate>
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autofocus
               placeholder="admin / manager / viewer">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required
               placeholder="admin123 / manager123 / viewer123">
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%">登录</button>
    </form>
  </div>
</div>
{% endblock %}
